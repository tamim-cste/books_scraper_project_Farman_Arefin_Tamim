version: "3.9"

services:
  scrapyd:
    build: .
    container_name: books_scrapyd
    ports:
      - "6800:6800"
    volumes:
      # Persist output files and logs on the host machine
      - ./output:/app/output
      - ./logs:/app/logs
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped

  # One-shot service: deploys the project and triggers the spider
  deployer:
    build: .
    container_name: books_deployer
    depends_on:
      - scrapyd
    entrypoint: >
      sh -c "
        echo 'Waiting for Scrapyd to start...' &&
        sleep 5 &&
        scrapyd-deploy local -p books_scraper &&
        echo 'Scheduling spider...' &&
        curl -s http://scrapyd:6800/schedule.json \
          -d project=books_scraper \
          -d spider=books &&
        echo 'Spider scheduled successfully.'
      "
    volumes:
      - ./output:/app/output
      - ./logs:/app/logs
